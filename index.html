<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracks Library - Votre Univers Musical Infini</title>
    <meta name="description" content="Découvrez Tracks Library, le service de streaming musical révolutionnaire sans publicité. Hi-Fi, Intelligent et Illimité.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-light-green: #1ed760;
            --bg-black: #090909;
            --bg-card: #181818;
            --bg-card-hover: #282828;
            --text-main: #FFFFFF;
            --text-muted: #b3b3b3;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            overflow: hidden; /* Main container handles scroll */
            user-select: none;
        }

        /* --- LAYOUT STRUCTURE --- */
        .app-container {
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 1fr 90px;
            height: 100vh;
            background: linear-gradient(135deg, #090909 0%, #121212 100%);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background-color: #000;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(45deg, var(--spotify-green), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .nav-items {
            list-style: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            font-size: 14px;
        }

        .nav-item:hover, .nav-item.active {
            color: #fff;
            background: var(--glass);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        /* --- MAIN CONTENT --- */
        .main-view {
            overflow-y: auto;
            position: relative;
            background: linear-gradient(to bottom, #1e1e1e, var(--bg-black) 40%);
        }

        header {
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(9, 9, 9, 0.8);
            backdrop-filter: blur(20px);
        }

        .search-container {
            position: relative;
            width: 350px;
        }

        .search-bar {
            width: 100%;
            background: #242424;
            border: 1px solid transparent;
            padding: 10px 40px;
            border-radius: 500px;
            color: #fff;
            outline: none;
            transition: var(--transition);
        }

        .search-bar:focus {
            background: #2a2a2a;
            border-color: var(--spotify-green);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #000;
            padding: 4px 12px 4px 4px;
            border-radius: 500px;
            cursor: pointer;
        }

        .user-profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 40px 32px;
            background: linear-gradient(to bottom, rgba(29, 185, 84, 0.4), transparent);
            border-radius: 8px;
            margin: 20px;
            display: flex;
            align-items: flex-end;
            gap: 30px;
            min-height: 300px;
        }

        .hero-img {
            width: 232px;
            height: 232px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            transform: scale(1);
            transition: var(--transition);
        }

        .hero:hover .hero-img {
            transform: scale(1.05);
        }

        .hero-content h1 {
            font-size: 80px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        /* --- MUSIC GRID --- */
        .section-container {
            padding: 20px 32px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
        }

        .track-card {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .track-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.1);
        }

        .card-img-container {
            position: relative;
            margin-bottom: 16px;
        }

        .track-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .play-overlay {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: var(--spotify-green);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
        }

        .track-card:hover .play-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .track-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* --- PLAYER BAR --- */
        .player-bar {
            grid-column: 1 / -1;
            background: #000;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .now-playing img {
            width: 56px;
            height: 56px;
            border-radius: 4px;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .btn-play {
            background: #fff;
            color: #000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-play:hover { transform: scale(1.1); }

        .progress-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            flex-grow: 1;
            height: 4px;
            background: #4d4d4d;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--text-main);
            border-radius: 2px;
            width: 30%;
            transition: background 0.2s;
        }

        .progress-bar-bg:hover .progress-bar-fill {
            background: var(--spotify-green);
        }

        /* --- ANIMATED AUDIO VISUALIZER (AI FEATURE) --- */
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 15px;
        }

        .bar {
            width: 3px;
            background: var(--spotify-green);
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            0% { height: 3px; }
            100% { height: 15px; }
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }

        /* --- DOWNLOAD & AI --- */
        .badge {
            background: rgba(29, 185, 84, 0.2);
            color: var(--spotify-green);
            padding: 4px 8px;
            font-size: 10px;
            border-radius: 4px;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">

    <!-- Main View -->
    <main class="main-view" id="mainView">
        <header>
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Que voulez-vous écouter ?" id="userSearch">
            </div>
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=User&background=1DB954&color=fff" alt="Profile">
                <span style="font-weight: 600; font-size: 13px;">Utilisateur Pro</span>
            </div>
        </header>

        <section class="hero">
            <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=400&q=80" class="hero-img" alt="Top Mix">
            <div class="hero-content">
                <span class="badge">AI GENERATED MIX</span>
                <h1>Votre Mix Quotidien</h1>
                <p style="color: var(--text-muted); font-size: 18px;">Basé sur vos goûts, amélioré par Tracks AI.</p>
            </div>
        </section>

        <div class="section-container">
            <div class="section-title">

                <span style="font-size: 12px; color: var(--text-muted); cursor: pointer;">TOUT AFFICHER</span>

            <div class="music-grid" id="trendingGrid">

            </div>

        <div class="section-container">
            <div class="section-title">Recommandations pour vous</div>
            <div class="music-grid" id="recGrid">
                <!-- Data will be injected here -->
            </div>
        </div>
        
        <div style="height: 100px;"></div>
    </main>

    <!-- Player Bar -->
    <footer class="player-bar">
        <div class="now-playing">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&w=100&q=80" id="currentTrackImg">
            <div>
                <div class="track-title" id="currentTrackTitle">Choisissez un titre</div>
                <div class="track-artist" id="currentTrackArtist">Tracks Library Pro</div>
            </div>
            <div class="visualizer" id="audioVisualizer" style="display:none;">
                <div class="bar" style="animation-delay: -0.2s;"></div>
                <div class="bar" style="animation-delay: -0.4s;"></div>
                <div class="bar" style="animation-delay: -0.1s;"></div>
                <div class="bar" style="animation-delay: -0.3s;"></div>
                <div class="bar" style="animation-delay: -0.5s;"></div>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-buttons">
                <svg width="16" height="16" fill="currentColor" style="color: #1DB954;"><path d="M13.151.922a.75.75 0 10-1.06 1.06L13.109 3H11a6 6 0 00-6 6v2.109l-1.018-1.018a.75.75 0 00-1.06 1.06L5.422 13.65a.75.75 0 001.06 0l2.5-2.5a.75.75 0 00-1.06-1.06L6.5 11.109V9a4.5 4.5 0 014.5-4.5H13.109l-1.018 1.018a.75.75 0 101.06 1.06L15.65 4.078a.75.75 0 000-1.06L13.15 1.078h.001zM1.922 13.151a.75.75 0 001.06-1.06L1.922 11.109H4.5A4.5 4.5 0 019 6.5H11.109a.75.75 0 001.06 1.06l2.5-2.5a.75.75 0 00-1.06-1.06L11.109 3H9a6 6 0 00-6 6v2.109l-1.018-1.018a.75.75 0 00-1.06 1.06L2.422 13.65a.75.75 0 001.06 0l2.5-2.5a.75.75 0 00-1.06-1.06L1.922 13.151z"/></svg>
                <svg width="16" height="16" fill="currentColor"><path d="M12.7 1h-2v10.3l-5-5-1.4 1.4 5.3 5.3-5.3 5.3 1.4 1.4 5-5V23h2V1z"/></svg>
                <button class="btn-play" onclick="togglePlay()">

                <svg width="16" height="16" fill="currentColor"><path d="M11.3 1h2v22h-2v-10.3l-5 5-1.4-1.4 5.3-5.3-5.3-5.3 1.4-1.4 5 5V1z"/></svg>

            <div class="progress-container">

<script>
    // --- APP STATE ---
    let tracks = [];
    let isPlaying = false;
    let currentTrack = null;
    let timer = null;
    let progress = 0;

    // --- AI POWERED MOCK DATA (Simulated API) ---
    const generateCatalog = () => {
        const artists = ["Daft Punk", "The Weeknd", "Dua Lipa", "Hans Zimmer", "Arctic Monkeys", "Kavinsky", "Lana Del Rey"];
        const genres = ["Synthwave", "Cyberpunk", "Cinematic", "Indie Rock", "Pop", "Deep House"];
        
        return Array.from({length: 24}, (_, i) => ({
            id: i,
            title: `Track ${i + 1} - Infinite Vibes`,
            artist: artists[Math.floor(Math.random() * artists.length)],
            genre: genres[Math.floor(Math.random() * genres.length)],
            image: `https://picsum.photos/400/400?random=${i}`,
            duration: 30, // Mock sample
            isPremium: true
        }));
    };

    const renderTracks = (data, containerId) => {
        const container = document.getElementById(containerId);
        container.innerHTML = data.map(track => `
            <div class="track-card" onclick="playTrack(${track.id})">
                <div class="card-img-container">
                    <img src="${track.image}" alt="${track.title}" loading="lazy">
                    <div class="play-overlay">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="black"><path d="M7 6v12l10-6z"/></svg>
                    </div>
                </div>
                <div class="track-title">${track.title}</div>
                <div class="track-artist">${track.artist}</div>
                <div style="margin-top: 8px; display: flex; gap: 5px;">
                   <span class="badge" style="font-size: 8px;">HI-FI</span>
                   <span class="badge" style="font-size: 8px; background: rgba(255,255,255,0.05); color: #fff;">${track.genre}</span>
                </div>
            </div>
        `).join('');
    };

    // --- PLAYER LOGIC ---
    const playTrack = (id) => {
        const track = tracks.find(t => t.id === id);
        if(!track) return;

        currentTrack = track;
        document.getElementById('currentTrackTitle').innerText = track.title;
        document.getElementById('currentTrackArtist').innerText = track.artist;
        document.getElementById('currentTrackImg').src = track.image;
        document.getElementById('audioVisualizer').style.display = 'flex';
        
        // Reset progress
        progress = 0;
        isPlaying = true;
        updateUI();
        startTimer();
    };

    const togglePlay = () => {
        if(!currentTrack) {
            playTrack(0);
            return;
        }
        isPlaying = !isPlaying;
        updateUI();
        if(isPlaying) startTimer();
        else stopTimer();
    };

    const updateUI = () => {
        const playIcon = document.getElementById('playIcon');
        if(isPlaying) {
            playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            document.getElementById('audioVisualizer').style.display = 'flex';
        } else {
            playIcon.innerHTML = '<path d="M7 6v12l10-6z"/>';
            document.getElementById('audioVisualizer').style.display = 'none';
        }
    };

    const startTimer = () => {
        stopTimer();
        timer = setInterval(() => {
            if(progress < 100) {
                progress += 0.5;
                document.getElementById('progressBarFill').style.width = `${progress}%`;
                
                const currentSec = Math.floor((progress / 100) * 30);
                document.getElementById('currentTime').innerText = `0:${currentSec < 10 ? '0' : ''}${currentSec}`;
            } else {
                stopTimer();
                isPlaying = false;
                updateUI();
            }
        }, 100);
    };

    const stopTimer = () => {
        if(timer) clearInterval(timer);
    };

    // --- SEARCH ANIMATION ---
    document.getElementById('userSearch').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = tracks.filter(t => t.title.toLowerCase().includes(query) || t.artist.toLowerCase().includes(query));
        renderTracks(filtered.slice(0, 8), 'trendingGrid');
    });

    // --- INIT ---
    const init = () => {
        tracks = generateCatalog();
        renderTracks(tracks.slice(0, 8), 'trendingGrid');
        renderTracks(tracks.slice(8, 16), 'recGrid');
        
        // Handle transparency on scroll
        const mainView = document.getElementById('mainView');
        mainView.addEventListener('scroll', () => {
            const opacity = Math.min(mainView.scrollTop / 300, 1);
            document.querySelector('header').style.background = `rgba(9, 9, 9, ${opacity * 1})`;
        });
    };

    init();
</script>

</body>
</html>
