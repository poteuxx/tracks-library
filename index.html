<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracks Library - Votre Univers Musical Infini</title>
    <meta name="description" content="Découvrez Tracks Library, le service de streaming musical révolutionnaire sans publicité. Hi-Fi, Intelligent et Illimité.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-light-green: #1ed760;
            --bg-black: #090909;
            --bg-card: #181818;
            --bg-card-hover: #282828;
            --text-main: #FFFFFF;
            --text-muted: #b3b3b3;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --accent: #1DB954;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            overflow: hidden;
            user-select: none;
        }

        /* --- LAYOUT STRUCTURE --- */
        .app-container {
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 1fr 90px;
            height: 100vh;
            background: linear-gradient(135deg, #090909 0%, #121212 100%);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background-color: #000;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid rgba(255,255,255,0.05);
            overflow-y: auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(45deg, var(--accent), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .nav-items {
            list-style: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            font-size: 14px;
        }

        .nav-item:hover, .nav-item.active {
            color: #fff;
            background: var(--glass);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .sidebar-playlists {
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .sidebar-playlists h3 {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 16px;
        }

        .playlist-link {
            padding: 8px 16px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-link:hover {
            color: #fff;
        }

        /* --- MAIN CONTENT --- */
        .main-view {
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        .main-view::before {
            content: '';
            position: fixed;
            top: 0;
            left: 240px;
            right: 0;
            height: 400px;
            background: linear-gradient(to bottom, var(--accent), transparent);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        header {
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s;
        }

        header.scrolled {
            background: rgba(9, 9, 9, 0.95);
            backdrop-filter: blur(20px);
        }

        .search-container {
            position: relative;
            width: 350px;
        }

        .search-bar {
            width: 100%;
            background: #242424;
            border: 1px solid transparent;
            padding: 10px 40px;
            border-radius: 500px;
            color: #fff;
            outline: none;
            transition: var(--transition);
        }

        .search-bar:focus {
            background: #2a2a2a;
            border-color: var(--accent);
            width: 450px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #000;
            padding: 4px 12px 4px 4px;
            border-radius: 500px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 60px 32px;
            margin: 20px;
            display: flex;
            align-items: flex-end;
            gap: 30px;
            min-height: 340px;
            border-radius: 12px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            position: relative;
            z-index: 1;
        }

        .hero-img {
            width: 232px;
            height: 232px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border-radius: 12px;
            transition: var(--transition);
            object-fit: cover;
        }

        .hero:hover .hero-img {
            transform: scale(1.02);
        }

        .hero-content h1 {
            font-size: 84px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -3px;
            line-height: 1;
        }

        /* --- MUSIC GRID --- */
        .section-container {
            padding: 30px 32px;
            position: relative;
            z-index: 1;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }

        .track-card {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .track-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-8px);
            border-color: rgba(255,255,255,0.1);
        }

        .card-img-container {
            position: relative;
            margin-bottom: 16px;
        }

        .track-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .play-overlay {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: var(--accent);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
        }

        .track-card:hover .play-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .track-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            color: var(--text-muted);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- PLAYER BAR --- */
        .player-bar {
            grid-column: 1 / -1;
            background: #000;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .now-playing img {
            width: 56px;
            height: 56px;
            border-radius: 4px;
            object-fit: cover;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .control-btn:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .btn-play-main {
            background: #fff;
            color: #000;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-play-main:hover { transform: scale(1.1); }

        .progress-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .progress-bar-bg {
            flex-grow: 1;
            height: 4px;
            background: #4d4d4d;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--text-main);
            border-radius: 2px;
            width: 0%;
            transition: background 0.2s;
        }

        .progress-bar-bg:hover .progress-bar-fill {
            background: var(--accent);
        }

        /* --- VISUALIZER CANVAS --- */
        #visualizerCanvas {
            position: fixed;
            bottom: 90px;
            left: 0;
            width: 100%;
            height: 80px;
            pointer-events: none;
            opacity: 0.4;
            z-index: 500;
        }

        /* --- BADGES & TAGS --- */
        .badge {
            background: rgba(29, 185, 84, 0.2);
            color: var(--accent);
            padding: 4px 10px;
            font-size: 10px;
            border-radius: 20px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* --- LOADING SPINNER --- */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            width: 100%;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }

    </style>
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo" onclick="loadCategory('popularity_total')">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="var(--accent)"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.494 17.3c-.22.36-.68.48-1.04.26-2.85-1.74-6.43-2.13-10.66-1.16-.41.09-.82-.17-.91-.58-.09-.41.17-.82.58-.91 4.63-1.06 8.57-.61 11.77 1.35.36.22.48.68.26 1.04zm1.46-3.26c-.28.45-.87.59-1.32.31-3.25-2-8.21-2.58-12.06-1.42-.51.15-1.05-.14-1.21-.65-.15-.51.14-1.05.65-1.21 4.41-1.33 9.9-.68 13.63 1.61.45.29.59.88.31 1.32zm.12-3.39c-3.9-2.32-10.32-2.54-14.07-1.41-.6.18-1.24-.16-1.42-.76-.18-.6.16-1.24.76-1.42 4.29-1.31 11.39-1.03 15.91 1.65.54.32.72 1.02.4 1.56-.31.54-1.01.71-1.55.39z"/></svg>
            Tracks
        </div>
        <nav>
            <div class="nav-item active" onclick="loadCategory('popularity_total')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>

            </div>
            <div class="nav-item" onclick="focusSearch()">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

            </div>
            <div class="nav-item" onclick="loadLiked()">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>

            </div>
        </nav>

        <div class="sidebar-playlists">

            <div id="sidebarPlaylists">
                <!-- Playlists from API will appear here -->
                <div class="playlist-link">Chargement...</div>
            </div>
        </div>
    </aside>

    <!-- Main View -->
    <main class="main-view" id="mainView">
        <header id="mainHeader">
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Rechercher des artistes ou des titres..." id="userSearch">
            </div>
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=User&background=1DB954&color=fff" alt="Profile">
                <span style="font-weight: 600; font-size: 13px;">Poteuxx Member</span>
            </div>
        </header>

        <section class="hero" id="heroSection">
            <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=600&q=80" class="hero-img" id="heroImg">
            <div class="hero-content">
                <span class="badge">SÉLECTION DU MOMENT</span>
                <h1 id="heroTitle">Top Hits 2024</h1>
                <p id="heroDesc" style="color: var(--text-muted); font-size: 18px; max-width: 600px;">Découvrez les titres les plus écoutés sur Tracks Library cette semaine.</p>
            </div>
        </section>

        <div id="contentArea">
            <div class="section-container">
                <div class="section-title">
                    <span id="sectionLabel">Sons du moment</span>
                </div>
                <div class="music-grid" id="mainGrid">
                    <!-- Data will be injected here -->
                    <div class="loader"><div class="spinner"></div></div>
                </div>
            </div>
            <div id="gridFooter" style="text-align: center; padding: 40px;">
                <button class="hero-btn" id="loadMoreBtn" onclick="loadMore()">Charger plus de titres</button>
            </div>
        </div>
        
        <div style="height: 100px;"></div>
    </main>

    <!-- Visualizer Canvas -->
    <canvas id="visualizerCanvas"></canvas>

    <!-- Player Bar -->

        <div class="now-playing">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&w=100&q=80" id="currentTrackImg">
            <div style="overflow: hidden;">
                <div class="track-title" id="currentTrackTitle">En attente...</div>
                <div class="track-artist" id="currentTrackArtist">Choisissez un titre</div>
            </div>
            <button class="control-btn" onclick="toggleLike(currentTrackId)" id="likeBtn">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </button>
        </div>

        <div class="player-controls">

                <button class="control-btn" onclick="toggleShuffle()" title="Aléatoire">

                </button>
                <button class="control-btn" onclick="prevTrack()" title="Précédent">
                    <svg width="20" height="20" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="btn-play-main" onclick="togglePlay()" id="playBtn">
                    <svg id="playIcon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="control-btn" onclick="nextTrack()" title="Suivant">
                    <svg width="20" height="20" fill="currentColor"><path d="M6 18l8.5-6L6 6zm9-12h2v12h-2z"/></svg>
                </button>
                <button class="control-btn" onclick="toggleRepeat()" title="Répéter">
                    <svg width="18" height="18" fill="currentColor" id="repeatIcon"><path d="M7 7h10v3l4-4l-4-4v3H5v6h2V7zm10 10H7v-3l-4 4l4 4v-3h12v-6h-2v4z"/></svg>
                </button>
            </div>
            <div class="progress-container">
                <span id="currentTime">0:00</span>

        </div>
    </footer>
</div>

<!-- Audio Element -->
<audio id="audioPlayer"></audio>

<script>
    // --- CONSTANTS & STATE ---
    const CLIENT_ID = '709fa152'; // Test Client ID for Jamendo
    const API_BASE = 'https://api.jamendo.com/v3.0';
    
    let tracks = [];
    let currentTrackId = null;
    let isPlaying = false;
    let isShuffle = false;
    let isRepeat = false;
    let audioContext, analyser, dataArray, source;
    let animationId;
    let currentOffset = 0;
    let currentCategory = 'popularity_total';

    const audio = document.getElementById('audioPlayer');
    const mainGrid = document.getElementById('mainGrid');
    const userSearch = document.getElementById('userSearch');

    // --- API SERVICE ---
    const fetchAPI = async (endpoint, params = {}) => {
        const query = new URLSearchParams({
            client_id: CLIENT_ID,
            format: 'json',
            limit: 50,
            offset: currentOffset,
            ...params
        });
        try {
            const response = await fetch(`${API_BASE}/${endpoint}/?${query}`);
            const data = await response.json();
            return data.results;
        } catch (err) {
            console.error("API Error:", err);
            return [];
        }
    };

    // --- INITIALIZATION ---
    const init = async () => {
        setupPlayer();
        loadCatalog();
        loadPlaylists();
        setupVisualizer();
        
        // Header scroll effect
        document.getElementById('mainView').onscroll = (e) => {
            const header = document.getElementById('mainHeader');
            if (e.target.scrollTop > 50) header.classList.add('scrolled');
            else header.classList.add('scrolled'); 
        };

        // Search event
        userSearch.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                currentOffset = 0;
                handleSearch(e.target.value);
            }
        });
    };

    const loadCatalog = async (order = 'popularity_total', append = false) => {
        if (!append) {
            currentOffset = 0;
            mainGrid.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
        }
        currentCategory = order;
        const data = await fetchAPI('tracks', { order, audioformat: 'mp32' });
        
        if (append) {
            tracks = [...tracks, ...data];
        } else {
            tracks = data;
        }
        
        renderTracks(data, append);
        
        if (!append && data.length > 0) {
            const top = data[0];
            document.getElementById('heroTitle').innerText = top.name;
            document.getElementById('heroDesc').innerText = `Écoutez le dernier succès de ${top.artist_name}`;
            if (top.image) document.getElementById('heroImg').src = top.image;
        }
    };

    const loadMore = () => {
        currentOffset += 50;
        loadCatalog(currentCategory, true);
    };

    const loadPlaylists = async () => {
        const data = await fetchAPI('playlists', { limit: 20, order: 'relevance' });
        const sidebar = document.getElementById('sidebarPlaylists');
        sidebar.innerHTML = data.map(pl => `
            <div class="playlist-link" onclick="loadPlaylistTracks('${pl.id}', '${pl.name}')">${pl.name}</div>
        `).join('');
    };

    const loadPlaylistTracks = async (id, name) => {
        currentOffset = 0;
        mainGrid.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
        document.getElementById('sectionLabel').innerText = `Playlist: ${name}`;
        const data = await fetchAPI('playlists/tracks', { id });
        if (data && data[0]) {
            const playlistTracks = data[0].tracks;
            tracks = playlistTracks;
            renderTracks(playlistTracks);
            window.scrollTo(0, 400);
            document.getElementById('gridFooter').style.display = 'none'; // Playlists are fixed
        }
    };

    // --- UI RENDERING ---
    const renderTracks = (data, append = false) => {
        if (!data || (data.length === 0 && !append)) {
            mainGrid.innerHTML = '<p style="padding: 20px; color: var(--text-muted);">Aucun résultat trouvé.</p>';
            return;
        }
        
        const html = data.map(track => `
            <div class="track-card" onclick="playTrack('${track.id}')">
                <div class="card-img-container">
                    <img src="${track.image || 'https://picsum.photos/300/300?music'}" alt="${track.name}" loading="lazy">
                    <div class="play-overlay">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="black"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
                <div class="track-title">${track.name}</div>
                <div class="track-artist">${track.artist_name}</div>
                <div style="margin-top: 10px; display: flex; gap: 5px;">
                   <span class="badge" style="font-size: 8px;">Hi-Fi</span>
                </div>
            </div>
        `).join('');

        if (append) {
            mainGrid.insertAdjacentHTML('beforeend', html);
        } else {
            mainGrid.innerHTML = html;
        }
        
        document.getElementById('gridFooter').style.display = 'block';
    };

    const handleSearch = async (query) => {
        if (!query) return;
        document.getElementById('sectionLabel').innerText = `Résultats pour "${query}"`;
        mainGrid.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
        const data = await fetchAPI('tracks', { search: query, order: 'relevance' });
        tracks = data;
        renderTracks(data);
    };

    // --- PLAYER CORE ---
    const setupPlayer = () => {
        audio.onplay = () => {
            isPlaying = true;
            updatePlayIcon();
            startVisualizer();
        };
        audio.onpause = () => {
            isPlaying = false;
            updatePlayIcon();
        };
        audio.onended = () => {
            if (isRepeat) {
                audio.play();
            } else {
                nextTrack();
            }
        };
        audio.ontimeupdate = () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressBarFill').style.width = `${percent}%`;
            document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
            document.getElementById('totalTime').innerText = formatTime(audio.duration || 0);
        };
    };

    const playTrack = (id) => {
        const track = tracks.find(t => t.id === id);
        if (!track) return;

        currentTrackId = id;
        audio.src = track.audio;
        audio.play();

        document.getElementById('currentTrackTitle').innerText = track.name;
        document.getElementById('currentTrackArtist').innerText = track.artist_name;
        document.getElementById('currentTrackImg').src = track.image || 'https://picsum.photos/100/100?music';
        
        // Update accent color (simulated)
        const colors = ['#1DB954', '#1e90ff', '#ff4757', '#e84393', '#f9ca24', '#6c5ce7'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        document.documentElement.style.setProperty('--accent', randomColor);
    };

    const togglePlay = () => {
        if (!currentTrackId && tracks.length > 0) {
            playTrack(tracks[0].id);
            return;
        }
        if (isPlaying) audio.pause();
        else audio.play();
    };

    const nextTrack = () => {
        const index = tracks.findIndex(t => t.id === currentTrackId);
        let nextIndex = index + 1;
        if (isShuffle) nextIndex = Math.floor(Math.random() * tracks.length);
        if (nextIndex >= tracks.length) nextIndex = 0;
        playTrack(tracks[nextIndex].id);
    };

    const prevTrack = () => {
        const index = tracks.findIndex(t => t.id === currentTrackId);
        let prevIndex = index - 1;
        if (prevIndex < 0) prevIndex = tracks.length - 1;
        playTrack(tracks[prevIndex].id);
    };

    const updatePlayIcon = () => {
        const icon = document.getElementById('playIcon');
        if (isPlaying) icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        else icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    };

    const seek = (e) => {
        const rect = document.getElementById('progressBarBg').getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pos * audio.duration;
    };

    const setVolume = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        audio.volume = Math.max(0, Math.min(1, pos));
        document.getElementById('volumeFill').style.width = `${pos * 100}%`;
    };

    const formatTime = (sec) => {
        if (isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    };

    // --- VISUALIZER ---
    const setupVisualizer = () => {
        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');
        
        const resize = () => {
            canvas.width = window.innerWidth;
            canvas.height = 80;
        };
        window.onresize = resize;
        resize();

        const initializeCtx = () => {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        };

        window.startVisualizer = () => {
            initializeCtx();
            if (audioContext.state === 'suspended') audioContext.resume();
            
            const draw = () => {
                animationId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / dataArray.length) * 2.5;
                let x = 0;

                for(let i = 0; i < dataArray.length; i++) {
                    const barHeight = (dataArray[i] / 255) * canvas.height;
                    const r = 29, g = 185, b = 84; // Spotify Green matching
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${dataArray[i]/255})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            };
            draw();
        };
    };

    // --- STORAGE & EXTRA ---
    const toggleLike = (id) => {
        if(!id) return;
        const index = tracks.findIndex(t => t.id === id);
        // Toggle simple visual state
        const btn = document.getElementById('likeBtn');
        btn.style.color = btn.style.color === 'rgb(255, 71, 87)' ? 'var(--text-muted)' : '#ff4757';
    };

    const toggleShuffle = () => {
        isShuffle = !isShuffle;
        document.getElementById('shuffleIcon').parentElement.style.color = isShuffle ? 'var(--accent)' : 'var(--text-muted)';
    };

    const toggleRepeat = () => {
        isRepeat = !isRepeat;
        document.getElementById('repeatIcon').parentElement.style.color = isRepeat ? 'var(--accent)' : 'var(--text-muted)';
    };

    const focusSearch = () => {
        userSearch.focus();
        window.scrollTo(0, 0);
    };

    const loadLiked = () => {
        document.getElementById('sectionLabel').innerText = "Titres likés (Démo)";
        renderTracks([]); // Logic to load from localStorage would go here
    };

    const loadCategory = (order) => {
        loadCatalog(order);
    };

    const toggleFullscreen = () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    };

    // Start App
    init();

</script>

</body>
</html>
