<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracks Library - Senior Edition v3.3.0</title>
    <meta name="description" content="Streaming musical premium, intelligent et sans publicité.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --accent: #1DB954;
            --bg-black: #050505;
            --text-main: #FFFFFF;
            --text-muted: #a7a7a7;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --sidebar-width: 260px;
            --player-height: 100px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-black); color: var(--text-main); overflow: hidden; height: 100vh; }

        .app-container {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: 1fr var(--player-height);
            height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar { background: #000; padding: 30px 20px; border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 30px; }
        .logo { cursor: pointer; padding-left: 10px; margin-bottom: 20px; }
        .logo i { font-style: normal; font-weight: 900; font-size: 26px; color: var(--accent); letter-spacing: -1px; }
        .logo span { display: block; font-size: 11px; opacity: 0.6; letter-spacing: 5px; text-transform: uppercase; margin-top: -5px; }

        .nav-section { display: flex; flex-direction: column; gap: 5px; }
        .nav-link { 
            display: flex; align-items: center; gap: 16px; color: var(--text-muted); text-decoration: none; 
            padding: 12px 16px; border-radius: 12px; font-weight: 600; transition: 0.2s; cursor: pointer;
            font-size: 15px;
        }
        .nav-link:hover, .nav-link.active { color: #fff; background: var(--glass); }
        .nav-link svg { width: 22px; height: 22px; }

        /* --- MAIN VIEW --- */
        .main-view { background: radial-gradient(circle at top right, #151515, #050505); overflow-y: auto; scroll-behavior: smooth; position: relative; }
        header { 
            padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; background: rgba(5,5,5,0.8); backdrop-filter: blur(40px); border-bottom: 1px solid var(--glass-border);
        }
        .search-container { position: relative; width: 400px; }
        .search-container input { width: 100%; height: 45px; background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); border-radius: 50px; padding: 0 45px; color: #fff; outline: none; transition: 0.3s; font-size: 14px; }
        .search-container input:focus { border-color: var(--accent); background: rgba(255,255,255,0.12); width: 500px; }

        .hero-spot { 
            margin: 40px; border-radius: 28px; height: 380px; background-size: cover; background-position: center; position: relative;
            display: flex; align-items: flex-end; padding: 50px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            transition: 0.6s ease;
        }
        .hero-spot::before { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, transparent 100%); }
        .hero-spot-content { position: relative; z-index: 5; display: flex; align-items: center; gap: 40px; width: 100%; }

        .content-area { padding: 0 40px 80px; }
        .track-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .track-card { 
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); cursor: pointer; transition: 0.3s;
            position: relative;
        }
        .track-card:hover { transform: scale(1.03) translateY(-10px); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .track-card img { width: 100%; aspect-ratio: 1; border-radius: 14px; margin-bottom: 15px; object-fit: cover; }
        .track-card .title { font-weight: 800; font-size: 16px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-card .artist { font-size: 13px; color: var(--text-muted); font-weight: 500; }

        /* --- PLAYER BAR --- */
        .player-bar { 
            grid-column: 1 / -1; background: #000; border-top: 1px solid var(--glass-border); 
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 40px; z-index: 2000;
        }
        .mini-info { display: flex; align-items: center; gap: 20px; overflow: hidden; }
        .mini-info img { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; }
        
        .controls-ui { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .btns-row { display: flex; align-items: center; gap: 40px; }
        .p-btn-play { background: #fff; color: #000; width: 44px; height: 44px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        .p-btn-play:hover { transform: scale(1.1); box-shadow: 0 8px 20px rgba(255,255,255,0.2); }
        
        .progress-row { width: 100%; max-width: 700px; display: flex; align-items: center; gap: 15px; font-size: 12px; color: var(--text-muted); font-weight: 700; }
        .progress-bg { flex-grow: 1; height: 6px; background: #2a2a2a; border-radius: 10px; cursor: pointer; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 10px; pointer-events: none; transition: width 0.1s linear; }
        .progress-bg:hover .progress-fill { background: var(--accent); }

        .cat-bar { display: flex; gap: 12px; padding: 15px 40px; overflow-x: auto; scrollbar-width: none; }
        .cat-item { background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .cat-item.active { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05); }

        .toast-popup { position: fixed; bottom: 125px; right: 40px; background: var(--accent); color: #000; padding: 15px 30px; border-radius: 15px; font-weight: 900; animation: bounceUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; z-index: 10000; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        @keyframes bounceUp { from { opacity: 0; transform: translateY(50px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        #vizOverlay { position: fixed; bottom: var(--player-height); left: 0; width: 100%; height: 50px; pointer-events: none; opacity: 0.1; z-index: 1500; }
        
        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .app-container { display: flex; flex-direction: column; overflow: hidden; }
            .sidebar { display: none; }
            .mobile-nav { display: flex; justify-content: space-around; background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); padding: 10px; z-index: 2100; position: fixed; bottom: 0; width: 100%; }
            .mobile-nav .nav-link { flex-direction: column; gap: 5px; font-size: 11px; padding: 5px; align-items: center; justify-content: center; flex: 1; margin: 0; }
            .main-view { height: calc(100vh - 140px); overflow-y: auto; padding-bottom: 20px; }
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .search-container { width: 100%; }
            .search-container input:focus { width: 100%; }
            .hero-spot { height: auto; padding: 30px 20px; margin: 20px; text-align: center; align-items: center; justify-content: center; overflow: visible;}
            .hero-spot-content { flex-direction: column; align-items: center; gap: 20px; }
            .hero-spot h1 { font-size: 32px !important; margin: 10px 0; }
            #hImg { width: 150px !important; height: 150px !important; margin-top: -60px; }
            .content-area { padding: 0 20px 40px; }
            .player-bar { 
                grid-template-columns: 1fr; padding: 10px 20px; height: auto; position: fixed; bottom: 65px; width: 100%; 
                border-top: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.95); z-index: 2000;
                gap: 10px;
            }
            .controls-ui { margin-top: 5px; }
            .btns-row { gap: 20px; justify-content: center; width: 100%; }
            .mini-info { justify-content: flex-start; }
            .mini-info img { width: 44px; height: 44px; }
            #vBg { display: none; }
            #vizOverlay { bottom: 140px; }
        }
        @media (min-width: 769px) { .mobile-nav { display: none; } }
    </style>
</head>

    <audio id="coreP" crossorigin="anonymous"></audio>

    <script>
        const SERVERS = [
            'https://invidious.kavin.rocks', 'https://yewtu.be', 
            'https://inv.riverside.rocks', 'https://invidious.snopyta.org',
            'https://vid.priv.au', 'https://invidious.namazso.eu'
        ];
        let sIdx = 0;
        
        const state = {
            list: [], cur: null, play: false,
            liked: JSON.parse(localStorage.getItem('likedTracks') || '[]'),
            cache: JSON.parse(localStorage.getItem('searchCache') || '[]')
        };

        // Normalization: fix "undefined" artists from old versions
        state.liked = state.liked.map(t => ({
            ...t,
            artist: t.artist || t.author || "Artiste Inconnu",
            img: t.img || `https://picsum.photos/400/400?sig=${t.id}`
        }));

        const ui = {
            audio: document.getElementById('coreP'), grid: document.getElementById('mGrid'),
            search: document.getElementById('mSearch'), playBtn: document.getElementById('pSwitch'),
            pIcon: document.getElementById('pIcon'), pFill: document.getElementById('pFill'),
            curT: document.getElementById('pCurT'), durT: document.getElementById('pDurT'),
            likeBtn: document.getElementById('lBtn')
        };

        async function fetchAPI(q = 'lofi music') {
            const base = SERVERS[sIdx];
            try {
                const res = await fetch(`${base}/api/v1/search?q=${encodeURIComponent(q)}&type=video`);
                if(!res.ok) throw new Error();
                const json = await res.json();
                const mapped = json.slice(0, 30).map(v => ({
                    id: v.videoId, 
                    name: v.title.replace(/official audio|official video|music video/gi, '').trim(),
                    artist: v.author || "Artiste Inconnu", 
                    img: v.videoThumbnails ? v.videoThumbnails[0].url : `https://picsum.photos/400/400?sig=${v.videoId}`,
                    url: `${base}/latest/videoplayback?id=${v.videoId}&itag=140`
                }));
                localStorage.setItem('searchCache', JSON.stringify(mapped));
                return mapped;
            } catch (e) {
                // FALLBACK TO AUDIUS IF INVIDIOUS FAILS
                try {
                    const res = await fetch(`https://api.audius.co/v1/tracks/trending?app_name=TRACKS_LIB`);
                    const json = await res.json();
                    return json.data.slice(0, 24).map(t => ({
                        id: t.id, name: t.title, artist: t.user.name,
                        img: t.artwork ? t.artwork['480x480'] : 'https://picsum.photos/400/400',
                        url: `https://api.audius.co/v1/tracks/${t.id}/stream?app_name=TRACKS_LIB`
                    }));
                } catch(e2) {
                    sIdx = (sIdx + 1) % SERVERS.length;
                    return state.cache.length > 0 ? state.cache : [];
                }
            }
        }

        async function load(q) {
            ui.grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:100px; color:var(--text-muted);"><h3>CHARGEMENT DU FLUX...</h3></div>';
            const data = await fetchAPI(q);
            if(data.length > 0) {
                state.list = data;
                render(data);
                hero(data[Math.floor(Math.random() * data.length)]);
            } else {
                ui.grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; background:rgba(255,0,0,0.05); border-radius:20px;"><h3>FLUX INDISPONIBLE</h3><p>Les serveurs sont saturés. Cliquez pour réessayer.</p><button onclick="load()" style="margin-top:20px; background:var(--accent); border:none; padding:10px 25px; border-radius:30px; font-weight:800; cursor:pointer;">ACTUALISER</button></div>';
            }
        }

        function render(ts) {
            ui.grid.innerHTML = ts.map(t => `
                <div class="track-card" onclick="play('${t.id}')">
                    <img src="${t.img}" onerror="this.src='https://picsum.photos/400/400?music'">
                    <div class="title">${t.name}</div>
                    <div class="artist">${t.artist}</div>
                </div>
            `).join('');
        }

        function play(id) {
            const t = state.list.find(x => x.id == id) || state.liked.find(x => x.id == id);
            if(!t) return;
            state.cur = t;
            ui.audio.src = t.url;
            ui.audio.play().catch(() => next());
            document.getElementById('pTitle').innerText = t.name;
            document.getElementById('pArtist').innerText = t.artist;
            document.getElementById('pImg').src = t.img;
            updateLike();
            startVisualizer();
        }

        function next() {
            const i = state.list.findIndex(x => x.id == state.cur?.id);
            const n = state.list[(i + 1) % state.list.length];
            if(n) play(n.id);
        }

        function hero(t) {
            if(!t) return;
            document.getElementById('hTitle').innerText = t.name;
            document.getElementById('hArtist').innerText = `Par ${t.artist}`;
            document.getElementById('hImg').src = t.img;
            document.getElementById('hImg').style.display = 'block';
            document.getElementById('heroBox').style.backgroundImage = `linear-gradient(0deg, rgba(0,0,0,0.95) 0%, transparent 100%), url('${t.img}')`;
            document.getElementById('hPlay').onclick = () => play(t.id);
        }

        function updateLike() {
            const has = state.liked.some(x => x.id == state.cur?.id);
            ui.likeBtn.style.color = has ? '#ff4757' : '#a7a7a7';
        }

        ui.likeBtn.onclick = () => {
            if(!state.cur) return;
            const idx = state.liked.findIndex(x => x.id == state.cur.id);
            if(idx > -1) state.liked.splice(idx, 1);
            else state.liked.push(state.cur);
            localStorage.setItem('likedTracks', JSON.stringify(state.liked));
            updateLike();
            toast(idx > -1 ? "Retiré" : "Ajouté aux favoris !");
        };

        ui.playBtn.onclick = () => state.play ? ui.audio.pause() : ui.audio.play();
        ui.audio.onplay = () => { state.play = true; ui.pIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; };
        ui.audio.onpause = () => { state.play = false; ui.pIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; };
        ui.audio.onended = () => next();
        ui.audio.ontimeupdate = () => {
            const p = (ui.audio.currentTime / ui.audio.duration) * 100 || 0;
            ui.pFill.style.width = `${p}%`;
            ui.curT.innerText = fmt(ui.audio.currentTime);
            ui.durT.innerText = fmt(ui.audio.duration);
        };

        function fmt(s) { if(isNaN(s)) return '0:00'; const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }

        function goHome() { 
            document.getElementById('vTitle').innerText = "Sélectionné pour vous";
            document.getElementById('navHome').classList.add('active');
            document.getElementById('navLiked').classList.remove('active');
            if(document.getElementById('navHomeMob')) document.getElementById('navHomeMob').classList.add('active');
            if(document.getElementById('navLikedMob')) document.getElementById('navLikedMob').classList.remove('active');
            load(); 
        }
        function goLiked() { 
            document.getElementById('vTitle').innerText = "Vos coups de cœur";
            document.getElementById('navHome').classList.remove('active');
            document.getElementById('navLiked').classList.add('active');
            if(document.getElementById('navHomeMob')) document.getElementById('navHomeMob').classList.remove('active');
            if(document.getElementById('navLikedMob')) document.getElementById('navLikedMob').classList.add('active');
            
            if (state.liked.length === 0) {
                ui.grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:100px; color:var(--text-muted);"><h3>Aucun titre liké</h3><p>Vos pistes favorites apparaîtront ici.</p></div>';
            } else {
                render(state.liked); 
            }
        }

        document.querySelectorAll('.cat-item').forEach(p => p.onclick = () => {
            document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
            p.classList.add('active');
            load(p.innerText);
        });
        ui.search.onkeypress = (e) => e.key === 'Enter' && load(ui.search.value);

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault(); ui.playBtn.click(); }
            if (e.key === 'ArrowRight' && e.ctrlKey) { e.preventDefault(); next(); }
            if (e.key === 'ArrowLeft' && e.ctrlKey) { 
                e.preventDefault(); 
                if (ui.audio.currentTime > 3) ui.audio.currentTime = 0;
            }
            if (e.key === 'ArrowUp') { e.preventDefault(); ui.audio.volume = Math.min(1, ui.audio.volume + 0.1); toast('Volume: ' + Math.round(ui.audio.volume * 100) + '%'); }
            if (e.key === 'ArrowDown') { e.preventDefault(); ui.audio.volume = Math.max(0, ui.audio.volume - 0.1); toast('Volume: ' + Math.round(ui.audio.volume * 100) + '%'); }
            if (e.key === 'l' || e.key === 'L') { e.preventDefault(); ui.likeBtn.click(); }
            if (e.key === 'f' || e.key === 'F') { 
                e.preventDefault(); 
                if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); 
            }
        });

        let vCtx, vAn, vSrc;
        function startVisualizer() {
            if(vCtx) return;
            try {
                vCtx = new (window.AudioContext || window.webkitAudioContext)();
                vAn = vCtx.createAnalyser();
                vSrc = vCtx.createMediaElementSource(ui.audio);
                vSrc.connect(vAn); vAn.connect(vCtx.destination);
                const cvs = document.getElementById('vizOverlay');
                const ctx = cvs.getContext('2d');
                function draw() {
                    requestAnimationFrame(draw);
                    const data = new Uint8Array(vAn.frequencyBinCount);
                    vAn.getByteFrequencyData(data);
                    ctx.clearRect(0,0,cvs.width,cvs.height);
                    ctx.fillStyle = '#1DB954';
                    const lw = cvs.width / 128;
                    for(let i=0; i<128; i++) ctx.fillRect(i*lw, cvs.height - (data[i]/255 * cvs.height), lw-1, data[i]);
                }
                draw();
            } catch(e){}
        }

        function toast(m) {
            const t = document.createElement('div'); t.className = 'toast-popup'; t.innerText = m;
            document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
        }

        load();
    </script>
</body>
</html>
